<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0; padding: 0; font-family: sans-serif;
        background: #ffe6e6; display: flex; flex-direction: column;
        align-items: center; justify-content: center; min-height: 100vh;
        overflow: hidden; text-align: center;
    }

    img { width: 200px; border-radius: 20px; margin-bottom: 20px; }

    /* هذا الجزء هو السر لمنع التداخل */
    .buttons-container {
        display: grid;
        /* عمودين: الأول لـ "نعم" والثاني لـ "لا" */
        grid-template-columns: 1fr 1fr; 
        gap: 15px;
        align-items: center;
        width: 90%;
        max-width: 400px;
        transition: all 0.4s ease;
    }

    button {
        padding: 15px;
        border: none;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        width: 100%; /* ليملأ مساحة العمود الخاص به */
        transition: all 0.3s ease;
    }

    #yes { background: #28a745; color: white; }
    #no { background: #dc3545; color: white; }

    .heart { position: fixed; bottom: 0; animation: float 3s linear forwards; }
    @keyframes float { 100% { transform: translateY(-100vh); opacity: 0; } }
</style>
</head>
<body>

    <img id="mainImage" src="قطة.jpg">
    <h1 id="question">تحبيني؟ 💖</h1>

    <div class="buttons-container" id="gridContainer">
        <button id="yes">نعم</button>
        <button id="no">لا</button>
    </div>

<script>
    let yesBtn = document.getElementById("yes");
    let noBtn = document.getElementById("no");
    let grid = document.getElementById("gridContainer");
    let img = document.getElementById("mainImage");
    let question = document.getElementById("question");

    let yesGrowth = 1; // نسبة نمو زر نعم
    let noShrink = 1;  // نسبة تقلص زر لا
    let index = 0;
    let texts = ["😑💣ليش؟ 😢", "متأكدة؟ 😔", "فكري مرة ثانية 💔", "ترة ازعل 😭"];

    noBtn.addEventListener("click", () => {
        // 1. تغيير الصورة والنص
        img.src = "قطة نو.jpg";
        if(index < texts.length) question.innerText = texts[index++];

        // 2. السر هنا: نغير تقسيم الأعمدة في الـ Grid
        // نجعل العمود الأول (نعم) يكبر والعمود الثاني (لا) يصغر
        yesGrowth += 0.5;
        noShrink -= 0.2;

        grid.style.gridTemplateColumns = `${yesGrowth}fr ${noShrink}fr`;
        
        // 3. نكبر الخط داخل الزر أيضاً
        yesBtn.style.fontSize = (1.2 + (yesGrowth * 0.2)) + "rem";

        // 4. إخفاء "لا" تماماً إذا صغر جداً
        if(noShrink <= 0.2) {
            noBtn.style.display = "none";
            grid.style.gridTemplateColumns = "1fr";
        }
    });

    yesBtn.addEventListener("click", () => {
        question.innerText = "كنت أدري! 😎❤️";
        img.src = "قطة يس.jpg";
        noBtn.style.display = "none";
        grid.style.gridTemplateColumns = "1fr";
        
        for(let i=0; i<15; i++) {
            let h = document.createElement("div");
            h.className = "heart"; h.innerText = "💖";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (20 + Math.random() * 20) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }
    });
</script>
</body>
</html>
