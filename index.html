<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تحبني؟ 😏</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
        margin:0;
        padding:0;
        font-family: Arial;
        background: #ffe6e6;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        min-height: 100vh;
        overflow:hidden;
        text-align: center;
    }

    img{
        width: 50%;
        max-width: 300px;
        border-radius:20px;
        margin-top: 20px;
    }

    h1{
        font-size: 6vw; /* يتغير حسب حجم الشاشة */
        margin: 20px 0;
        transition:0.3s;
    }

    .buttons{
        margin-bottom: 20px;
    }

    button{
        padding:12px 25px;
        font-size:4vw;
        margin:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        transition:0.3s;
    }

    #yes{
        background:green;
        color:white;
    }

    #no{
        background:red;
        color:white;
    }

    /* القلوب */
    .heart{
        position:fixed;
        bottom:0;
        font-size:5vw;
        animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
        0%{
            transform: translateY(0);
            opacity:1;
        }
        100%{
            transform: translateY(-100vh);
            opacity:0;
        }
    }

    /* لجعل الأزرار أكبر على شاشات صغيرة */
    @media(max-width:600px){
        button{
            font-size:5vw;
            padding:15px 20px;
        }
    }
</style>
</head>

<body>

<img id="mainImage" src="قطة.jpg">

<h1 id="question">هل انت تحبيني؟ 💖</h1>

<div class="buttons">
    <button id="yes">نعم</button>
    <button id="no">لا</button>
</div>

<script>
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let img = document.getElementById("mainImage");
let question = document.getElementById("question");

let scaleYes = 1;
let scaleNo = 1;
let changed = false;

// العبارات
let texts = [
    "ليش لا؟ 😢",
    "فكري زين 😔",
    "حرام عليك 💔",
    "راح ازعل 😭",
    "آخر فرصة 😡"
];

let index = 0;

noBtn.addEventListener("click", function(){

    if(!changed){
        img.src = "قطة نو.jpg";
        changed = true;
    }

    if(index < texts.length){
        question.innerText = texts[index];
        index++;
    } else {
        question.style.display = "none";
    }

    scaleYes += 0.3;
    scaleNo -= 0.2;

    yesBtn.style.transform = "scale(" + scaleYes + ")";
    noBtn.style.transform = "scale(" + scaleNo + ")";

    if(scaleNo <= 0.2){
        noBtn.style.display = "none";
    }
});

// عند الضغط على نعم
yesBtn.addEventListener("click", function(){
    question.innerText = "كنت ادري 😎❤️";
    img.src = "قطة يس.jpg";

    // توليد قلوب
    for(let i=0; i<20; i++){
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerText = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (8 + Math.random()*5) + "vw";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 3000);
    }
});
</script>

</body>
</html>
