<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تحبني؟ 😏</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #ffe6e6;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        text-align: center;
        overflow-x: hidden;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        padding: 20px;
    }

    img {
        width: 60%;
        max-width: 250px;
        border-radius: 20px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 1.8rem;
        margin-bottom: 30px;
        color: #333;
        min-height: 60px; /* لمنع اهتزاز الشاشة عند تغيير النص */
    }

    .buttons-wrapper {
        display: flex;
        flex-direction: row; /* الأزرار بجانب بعضها */
        justify-content: center;
        align-items: center; /* توسيط عمودي للأزرار */
        gap: 20px;
        width: 100%;
        flex-wrap: wrap; /* للسماح بالنزول لسطر جديد إذا كبر الزر جداً */
    }

    button {
        border: none;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease; /* انسيابية في تغيير الحجم */
        white-space: nowrap; /* لمنع النص من الانقسام لسطرين */
    }

    #yes {
        background: #28a745;
        color: white;
        padding: 15px 30px;
        font-size: 1.2rem;
        order: 1; /* لضمان بقائه الأول دائماً */
    }

    #no {
        background: #dc3545;
        color: white;
        padding: 15px 30px;
        font-size: 1.2rem;
        order: 2;
    }

    .heart {
        position: fixed;
        bottom: 0;
        font-size: 2rem;
        animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-100vh); opacity: 0; }
    }
</style>
</head>

<body>

<div class="container">
    <img id="mainImage" src="قطة.jpg">
    <h1 id="question">هل انت تحبني؟ 💖</h1>

    <div class="buttons-wrapper">
        <button id="yes">نعم</button>
        <button id="no">لا</button>
    </div>
</div>

<script>
    let yesBtn = document.getElementById("yes");
    let noBtn = document.getElementById("no");
    let img = document.getElementById("mainImage");
    let question = document.getElementById("question");

    // نستخدم قيم رقمية للتحكم بالحجم الحقيقي
    let paddingVal = 15;
    let fontSizeVal = 1.2;
    let index = 0;

    let texts = [
        "ليش لا؟ 😢",
        "فكري زين 😔",
        "حرام عليك 💔",
        "راح ازعل 😭",
        "آخر فرصة 😡"
    ];

    noBtn.addEventListener("click", function() {
        // تغيير الصورة والنص
        img.src = "قطة نو.jpg";
        if(index < texts.length) {
            question.innerText = texts[index];
            index++;
        }

        // تكبير زر "نعم" فعلياً (تغيير الحشو والخط)
        paddingVal += 15; // زيادة الحشو (الوسع)
        fontSizeVal += 0.4; // زيادة حجم الخط

        yesBtn.style.padding = paddingVal + "px " + (paddingVal * 2) + "px";
        yesBtn.style.fontSize = fontSizeVal + "rem";

        // تصغير زر "لا" تدريجياً
        let currentNoScale = parseFloat(noBtn.style.transform.replace('scale(', '').replace(')', '')) || 1;
        currentNoScale -= 0.15;
        noBtn.style.transform = `scale(${currentNoScale})`;

        if(currentNoScale <= 0.4) {
            noBtn.style.display = "none";
        }
    });

    yesBtn.addEventListener("click", function() {
        question.innerText = "كنت ادري 😎❤️";
        img.src = "قطة يس.jpg";
        noBtn.style.display = "none";
        
        // إعادة زر نعم لحجم معقول عند الفوز
        yesBtn.style.padding = "20px 40px";
        yesBtn.style.fontSize = "1.5rem";

        for(let i=0; i<20; i++) {
            let heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerText = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }
    });
</script>

</body>
</html>
